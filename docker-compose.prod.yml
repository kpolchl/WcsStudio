version: '3.8'

networks:
  app_network:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: wcs_studio_prod
    volumes:
      - prod_pg_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  phoenix:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ecto://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/wcs_studio_prod
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE must be set}
      PHX_HOST: wcsstudio.nextserwewusek.top
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY must be set}
      POOL_SIZE: "10"
      UPLOADS_PATH: /app/priv/static/uploads
    volumes:
      - uploads_data:/app/priv/static/uploads
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy

volumes:
  prod_pg_data:
  uploads_data: