# docker-compose.yml (PRODUCTION)
version: '3.8'

networks:
  app_network:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-wcs_studio_prod}
    volumes:
      - prod_pg_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  phoenix:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    # No ports exposed to host — cloudflared talks directly to the container
    expose:
      - "4000"
    environment:
      DATABASE_URL: ecto://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wcs_studio_prod}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE must be set}
      PHX_HOST: wcsstudio.nextserwewusek.top
      PHX_SERVER: "true"
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY must be set}
      POOL_SIZE: "10"
      PORT: "4000"
      UPLOADS_PATH: /app/priv/static/uploads
    volumes:
      - uploads_data:/app/priv/static/uploads
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - /home/karolhaf/.cloudflared/ca875f88-28e5-4a70-b8db-e744d6c8552b.json:/etc/cloudflared/tunnel.json:ro
      - /home/karolhaf/.cloudflared/config-phoenix.yml:/etc/cloudflared/config.yml:ro
      - /home/karolhaf/.cloudflared/cert.pem:/etc/cloudflared/cert.pem:ro
    networks:
      - app_network
    depends_on:
      - phoenix

volumes:
  prod_pg_data:
  uploads_data:
